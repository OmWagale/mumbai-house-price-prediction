<!DOCTYPE html>
<html>

<head>
    <title>Mumbai House Price Predictor</title>
</head>

<body>

    <h1>Mumbai House Price Predictor</h1>

    <form action="/predict" method="POST">

        <label>Area (sq ft)</label>
        <input 
            type="number"
            name="area"
            value="{{ area if area else '' }}"
            required
        >

        <br><br>

        <label>BHK</label>
        <input 
            type="number"
            name="bhk"
            value="{{ bhk if bhk else '' }}"
            required
        >

        <br><br>

        <label>Bathrooms</label>
        <input 
            type="number"
            name="bathroom"
            value="{{ bathroom if bathroom else '' }}"
            required
        >

        <br><br>

        <label>Locality</label>

        <select name="locality">

            {% for loc in localities %}

                <option 
                    value="{{ loc }}"
                    {% if loc == selected_locality %}
                        selected
                    {% endif %}
                >
                    {{ loc }}
                </option>

            {% endfor %}

        </select>

        <br><br>

        <button type="submit">
            Predict Price
        </button>

        <button type="reset">
            Reset
        </button>

    </form>

    <h2>{{ prediction_text }}</h2>

</body>

</html>
