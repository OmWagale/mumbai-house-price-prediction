<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mumbai House Price Predictor</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .container{
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#333;
            margin-bottom:30px;
        }

        label{
            font-weight:bold;
            color:#444;
        }

        input, select{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:20px;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#007bff;
            color:white;
            font-size:18px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#0056b3;
        }

        .reset-btn{
            background:#dc3545;
        }

        .reset-btn:hover{
            background:#a71d2a;
        }

        .prediction{
            margin-top:25px;
            text-align:center;
            font-size:24px;
            color:green;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Mumbai House Price Predictor</h1>

        <form action="/" method="POST">

            <label>Area (sq ft)</label>

            <input
                type="number"
                name="area"
                value="{{ area if area else '' }}"
                required
            >

            <label>BHK</label>

            <input
                type="number"
                name="bhk"
                value="{{ bhk if bhk else '' }}"
                required
            >

            <label>Bathrooms</label>

            <input
                type="number"
                name="bathroom"
                value="{{ bathroom if bathroom else '' }}"
                required
            >

            <label>Locality</label>

            <select name="locality">

                {% for loc in localities %}

                    <option
                        value="{{ loc }}"
                        {% if loc == selected_locality %}
                            selected
                        {% endif %}
                    >
                        {{ loc }}
                    </option>

                {% endfor %}

            </select>

            <button type="submit">
                Predict Price
            </button>

            <button type="reset" class="reset-btn">
                Reset
            </button>

        </form>

        <div class="prediction">
            {{ prediction_text }}
        </div>

    </div>

</body>

</html>
